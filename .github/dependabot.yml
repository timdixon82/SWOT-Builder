# Dependabot configuration.
# Weekly schedule for the npm ecosystem (development tooling).
# The deployed application loads CDN dependencies at runtime; those are
# reviewed by hand on a monthly cadence as recorded in docs/log.md.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
