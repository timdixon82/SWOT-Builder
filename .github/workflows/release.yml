# Release automation with release-please.
# Hosted on GitHub Pages (Q28A). Deployment is automatic from main branch.
# No untrusted context variables are used in any run step.
# Action versions pinned on 2026-05-24.
# The GITHUB_TOKEN is a built-in GitHub Actions secret, not a third-party secret.

name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
