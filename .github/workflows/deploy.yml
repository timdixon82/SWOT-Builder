# Deploy to GitHub Pages.
# Runs on every push to main and on manual dispatch.
#
# SWOT Builder is an UNBUNDLED static site: it serves index.html, *.jsx,
# *.css, theme.js, models.json, assets/, and fonts/ straight from the repo
# root using in-browser Babel. There is no bundler and no npm run build.
# Instead of a Build step, the "Assemble site" step below copies only the
# runtime files into _site/, excluding node_modules, .git, .github, docs,
# package files, config files, and other dev-only artefacts.
#
# THIS IS THE TEAM STANDARD for deploying a static site to GitHub Pages.
# See docs/patterns/github-pages-deploy.md for the full standard.
#
# Activation (one-time, per repo): GitHub > Settings > Pages > Build and
# deployment > Source > "GitHub Actions" (NOT "Deploy from a branch").
# Equivalently, set the Pages build_type to "workflow" via the API.
#
# Action SHAs are pinned to FULL 40-character commit SHAs. Never use a
# shortened SHA: GitHub no longer resolves them and the deploy will fail
# (this caused a silent stale-deploy on the Image Colour Contrast Checker).
# The version tag is in the trailing comment; update SHAs via Dependabot.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. In-progress deploy is cancelled if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # SWOT Builder is unbundled: copy only runtime files into _site/.
      # node_modules, .git, .github, docs, package files, config files,
      # and dev-only artefacts are intentionally excluded.
      - name: Assemble site
        run: |
          mkdir _site
          cp index.html _site/
          cp swot-app.jsx swot-board.jsx swot-engine.jsx swot-interview.jsx swot-intro.jsx tweaks-panel.jsx _site/
          cp colors_and_type.css swot-styles.css _site/
          cp theme.js _site/
          cp models.json _site/
          cp -R assets _site/
          cp -R fonts _site/
          cp LICENSE README.md VERSION _site/

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
