# Continuous integration for SWOT Builder (Browser AI Application stack).
#
# Runs on every pull request and on pushes to main. Lints HTML (HTMLHint),
# CSS (Stylelint), and JavaScript/JSX (ESLint). All three linters are pinned
# in package.json and installed with npm ci from the committed package-lock.json.
#
# Security note: no untrusted GitHub context variables are interpolated into
# any run step. Every run command is a fixed string.
#
# Action versions are pinned to commit SHAs verified on 2026-05-24.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint HTML, CSS, and JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JavaScript
        run: npm run lint:js
