# Accessibility checks at WCAG 2.2 AAA using Pa11y and axe-core.
#
# Known limitation: the app requires JavaScript execution and browser-side Babel
# compilation to render. Pa11y and axe-core run against the static HTML shell,
# which catches HTML-level violations. Full rendered-interface testing is Carol's
# responsibility in her manual test pass.
#
# Pa11y: browser-driver-manager installs Chrome+ChromeDriver but does not place
# Chrome in Puppeteer's cache path. A CI-only pa11y.ci.json is generated via jq,
# setting chromeLaunchConfig.executablePath to the system Chrome so Pa11y's
# bundled puppeteer-core can find it regardless of runner Chrome version.
#
# axe-core: uses browser-driver-manager's installed ChromeDriver directly.
#
# This pattern must be applied to every team repo until pa11y changes how it
# resolves its Chrome path. See work folder 025 log for the investigation.
#
# Action versions pinned on 2026-05-24.

name: Accessibility
on:
  pull_request:

permissions:
  contents: read

jobs:
  accessibility:
    name: Pa11y and axe at WCAG 2.2 AAA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*

      - name: Install accessibility tools
        run: npm install -g pa11y @axe-core/cli@4.11.3 wait-on@8.0.1 browser-driver-manager@2.0.1

      - name: Install matching ChromeDriver for axe-core
        run: |
          # Detect system Chrome major version and install a matching pair.
          # browser-driver-manager install chrome (no version) installs the
          # latest stable, which may be newer than the runner's system Chrome.
          # Pinning to the system major version prevents ChromeDriver mismatches.
          # BDM version syntax: chrome@<version> (e.g. chrome@148).
          CHROME_MAJOR=$(google-chrome-stable --version 2>/dev/null | grep -oE '[0-9]+' | head -1)
          npx browser-driver-manager install "chrome@${CHROME_MAJOR:-stable}"
          bdm_bin=$(find "$HOME/.browser-driver-manager" -name "chromedriver" -type f 2>/dev/null | head -1)
          if [ -n "$bdm_bin" ]; then
            echo "$(dirname "$bdm_bin")" >> "$GITHUB_PATH"
          fi

      - name: Build CI pa11y config with system Chrome path
        run: |
          CHROME=$(which google-chrome-stable 2>/dev/null || which google-chrome 2>/dev/null || which chromium 2>/dev/null)
          jq --arg chrome "$CHROME" '.chromeLaunchConfig.executablePath = $chrome' pa11y.json > pa11y.ci.json

      - name: Serve the site in the background
        run: python3 -m http.server 8080 &

      - name: Wait for the server to be ready
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Pa11y on index.html at WCAG 2.2 AAA
        run: pa11y --standard WCAG2AAA --config pa11y.ci.json http://localhost:8080/index.html

      - name: axe-core on index.html at WCAG 2.2 AAA
        run: axe http://localhost:8080/index.html --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa --chrome-options=no-sandbox
