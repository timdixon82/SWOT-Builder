# Accessibility checks at WCAG 2.2 AAA using Pa11y and axe-core.
#
# Known limitation: the app requires JavaScript execution and browser-side Babel
# compilation to render. Pa11y and axe-core run against the static HTML shell,
# which catches HTML-level violations. Full rendered-interface testing is Carol's
# responsibility in her manual test pass.
#
# Pa11y picks up pa11y.json in the repository root, which sets
# chromeLaunchConfig.args to include --no-sandbox. This is required
# because GitHub Actions runners execute as root in a Docker container,
# where Chromium refuses to run without --no-sandbox.
#
# Action versions pinned on 2026-05-24.

name: Accessibility
on:
  pull_request:

permissions:
  contents: read

jobs:
  accessibility:
    name: Pa11y and axe at WCAG 2.2 AAA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*

      - name: Install accessibility tools
        run: npm install -g pa11y @axe-core/cli@4.11.3 wait-on@8.0.1 browser-driver-manager@2.0.1

      - name: Install matching ChromeDriver for axe-core
        run: npx browser-driver-manager install chrome

      - name: Serve the site in the background
        run: python3 -m http.server 8080 &

      - name: Wait for the server to be ready
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Pa11y on index.html at WCAG 2.2 AAA
        run: pa11y --standard WCAG2AAA http://localhost:8080/index.html

      - name: axe-core on index.html at WCAG 2.2 AAA
        run: axe http://localhost:8080/index.html --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa --chrome-options=no-sandbox
