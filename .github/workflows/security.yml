# Security checks: Semgrep, Trivy, and dependency review.
#
# Runs on every pull request and on a weekly schedule. Semgrep and Trivy
# look for vulnerable patterns and components. The dependency-review action
# blocks pull requests that introduce known-vulnerable dependencies.
#
# Security note: no untrusted GitHub context variables are interpolated into
# any run step. Every run command is a fixed string.
#
# Action versions are pinned to commit SHAs verified on 2026-05-24.

name: Security
on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Semgrep
        run: |
          pip install semgrep
          semgrep scan --config p/default --error

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
